<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>注文確認画面</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
	<header th:replace="~{header}"></header>
	<nav>
		<a href="/items">全商品</a>
		<a th:each="category:${categories}"
		   th:href="@{/items(categoryId=${category.id})}"
		   th:text="${category.name}"
		   style="margin-right: 5px;"></a>
		<a href="/cart" style="padding-left: 10px;">カートを見る</a>
	</nav>
	<main>
		<p>ご注文商品</p>
		<table>
			<tr>
				<th>NO</th>
				<th>商品名</th>
				<th>値段</th>
				<th>個数	</th>
				<th>小計</tr>
				<th> </th>
			</tr>
			<tr th:each = "item : ${@cart.items}">
				<td th:text = "${item.id}"></td>				
				<td th:text = "${item.name}"></td>
				<td th:text = "${item.price} + 円"></td>
				<td th:text = "${item.quantity}"></td>
				<td th:text = "${item.price * item.quantity} + 円"></td>
				<td>
					<form action = "/cart/delete" method = "post">
					<input type = "hidden" name = "itemId" th:value = "${item.id}">
					<button>削除</button>
					</form>
				</td>
			</tr>
			<tr>
				<td colspan = "5" th:text = "総計： + ${@cart.getTotalPrice()} + 円"></td>
				<td></td>
			</tr>
		</table>
		<br>
		<p>お客様情報確認</p>
		<form action = "/order" method = "post">
			<table>
				<tr>
					<th>お名前</th>
					<td th:text = "${customer.name}">	</td>
				</tr>
				<tr>
					<th>住所</th>
					<td th:text = "${customer.address}">	</td>
				</tr>
				<tr>
					<th>電話番号</th>
					<td th:text = "${customer.tel}">	</td>
				</tr>
				<tr>
					<th>email</th>
					<td th:text = "${customer.email}"></td>
				</tr>
			</table>
			<input type="hidden" name="name" th:value="${customer.name}">
			<input type="hidden" name="address" th:value="${customer.address}">
			<input type="hidden" name="tel" th:value="${customer.tel}">
			<input type="hidden" name="email" th:value="${customer.email}">
			<button>この内容で注文</button>
		</form>
	</main>
	
	
</body>
</html>
